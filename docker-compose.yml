services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment: { ZOOKEEPER_CLIENT_PORT: 2181 }
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [ zookeeper ]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports: ["8082:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: account
    ports: ["3306:3306"]
    volumes:
      - ./init/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: auth
    ports: ["5432:5432"]
    volumes:
      - ./init/postgres:/docker-entrypoint-initdb.d

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes:
      - ./init/mongo:/docker-entrypoint-initdb.d

  cassandra:
    image: cassandra:4.1
    ports: ["9042:9042"]
    healthcheck:
      test: ["CMD-SHELL","cqlsh -e 'describe cluster' 127.0.0.1 9042"]
      interval: 10s
      timeout: 5s
      retries: 30
    environment:
      - CASSANDRA_CLUSTER_NAME=ShoppingCluster

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./init/cassandra:/scripts
    command: >
      bash -c "
        echo 'Waiting for Cassandra to be ready...';
        sleep 5;
        echo 'Initializing Cassandra keyspaces and tables...';
        cqlsh cassandra -f /scripts/001_init.cql;
        echo 'Cassandra initialization complete!';
      "
    restart: "no"

  gateway:
    build: ./gateway
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports: ["8080:8080"]
    depends_on: [ auth-service, account-service, item-service, inventory-service, order-service, payment-service ]

  auth-service:
    build: ./auth-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports: ["9000:9000"]
    depends_on: [ postgres ]

  account-service:
    build: ./account-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports: ["9001:9001"]
    depends_on:
      mysql:
        condition: service_healthy

  item-service:
    build: ./item-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports: ["9002:9002"]
    depends_on: [ mongo ]

  inventory-service:
    build: ./inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports: ["9003:9003"]
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started

  order-service:
    build: ./order-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports: ["9004:9004"]
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      item-service:
        condition: service_started
      inventory-service:
        condition: service_started

  payment-service:
    build: ./payment-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports: ["9005:9005"]
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started