server:
  port: 8081

spring:
  application:
    name: gateway-test
  
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# JWT Configuration for tests
jwt:
  secret: testSecretKey123456789012345678901234567890123456789012345678901234567890
  expiration: 86400000

# Disable logging in tests
logging:
  level:
    org.springframework.cloud.gateway: ERROR
    org.springframework.security: ERROR
    com.icc.gateway: ERROR
    reactor.netty: ERROR