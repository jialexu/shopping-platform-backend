server:
  port: 8080

spring:
  application:
    name: gateway
  
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      
      routes:
        - id: auth
          uri: http://auth-service:9000
          predicates: 
            - Path=/api/auth/**
          filters:
            - RemoveRequestHeader=Cookie
            
        - id: account
          uri: http://account-service:9001
          predicates: 
            - Path=/api/accounts/**
          filters:
            - RemoveRequestHeader=Cookie
            
        - id: item
          uri: http://item-service:9002
          predicates: 
            - Path=/api/items/**
          filters:
            - RemoveRequestHeader=Cookie
            
        - id: inventory
          uri: http://inventory-service:9003
          predicates: 
            - Path=/api/inventory/**
          filters:
            - RemoveRequestHeader=Cookie
            
        - id: order
          uri: http://order-service:9004
          predicates: 
            - Path=/api/orders/**
          filters:
            - RemoveRequestHeader=Cookie
            
        - id: payment
          uri: http://payment-service:9005
          predicates: 
            - Path=/api/payments/**
          filters:
            - RemoveRequestHeader=Cookie

# JWT Configuration
jwt:
  secret: please-change-this-to-a-long-random-secret-string-at-least-256-bits-for-HS256-algorithm
  expiration: 3600000

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    com.icc.gateway: DEBUG

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always